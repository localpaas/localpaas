version: "3"

services:
  traefik:
    image: traefik:v3.6
    command:
      - "--api.insecure=true"
      - "--providers.swarm=true"
      - "--providers.swarm.watch=true"
      - "--providers.swarm.network=localpaas_net"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
    networks:
      # Connect to the 'localpaas_net' overlay network for inter-container communication across nodes
      - localpaas_net
    ports:
      # Expose traefik's entry points to the Swarm
      # Swarm requires the long syntax for ports.
      - target: 80 # Container port
        published: 80 # Host port exposed on the nodes
        protocol: tcp
        # 'host' mode binds directly to the node's IP where the task runs.
        # 'ingress' mode uses Swarm's Routing Mesh (load balances across nodes).
        # Choose based on your load balancing strategy. 'host' is often simpler if using an external LB.
        mode: host
      - target: 443 # Container port
        published: 443 # Host port
        protocol: tcp
        mode: host
      - target: 8080 # Traefik dashboard
        published: 38081 # Exposed dashboard
        protocol: tcp
        mode: host
    volumes:
      - ./localpaas/traefik/etc/dynamic:/etc/traefik/dynamic
      - ./localpaas/ssl/certs:/etc/traefik/ssl/certs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  db:
    image: postgres:18-alpine
    networks:
      - internal_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 3s
      retries: 3
    environment:
      POSTGRES_DB: localpaas
      POSTGRES_USER: localpaas
      POSTGRES_PASSWORD: abc123
      PGDATA: /var/lib/postgresql/18/docker
    ports:
      - target: 5432 # Container port
        published: 35432 # Host port exposed on the nodes
        protocol: tcp
        mode: host
    volumes:
      - localpaas_db:/var/lib/postgresql

  redis:
    image: redis:8-alpine
    command: redis-server
    networks:
      - internal_net
    ports:
      - target: 6379 # Container port
        published: 36379 # Host port exposed on the nodes
        protocol: tcp
        mode: host

  adminer:
    image: adminer:latest
    networks:
      - localpaas_net
      - internal_net
    ports:
      - target: 8080 # Container port
        published: 38080 # Host port exposed on the nodes
        protocol: tcp
        mode: host
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.adminer.rule=Host(`adminer.localhost`)"
        - "traefik.http.routers.adminer.entrypoints=websecure"
        - "traefik.http.routers.adminer.tls=true"
        - "traefik.http.routers.adminer-http.rule=Host(`adminer.localhost`)"
        - "traefik.http.routers.adminer-http.entrypoints=web"
        - "traefik.http.services.adminer.loadbalancer.server.port=8080"
        - "traefik.swarm.network=localpaas_net"

  redis_ui:
    image: redislabs/redisinsight:latest
    networks:
      - internal_net
    ports:
      - target: 5540 # Container port
        published: 35540 # Host port exposed on the nodes
        protocol: tcp
        mode: host

# Define the overlay network for Swarm
networks:
  localpaas_net:
    external: true
  internal_net:
    driver: overlay
    attachable: true

volumes:
  localpaas_db:
    driver: local
