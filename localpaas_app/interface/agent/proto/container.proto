syntax = "proto3";

package agent;

option go_package = "github.com/localpaas/localpaas/localpaas_app/interface/agent/proto;agentproto";

service ContainerService {
  // ContainerExec starts a command execution in a container and pipes stdout/stderr/stdin/resize.
  rpc ContainerExec(stream ContainerExecReq) returns (stream ContainerExecResp);
}

message ContainerExecReq {
  oneof value {
    ContainerExecConfig config = 1;
    bytes stdin = 2;
    TerminalSize resize = 3;
  }
}

message ContainerExecConfig {
  string container_id = 1;
  repeated string cmd = 2;
  repeated string env = 3;
  string working_dir = 4;
  bool tty = 5;
  TerminalSize console_size = 6;
}

message TerminalSize {
  uint32 width = 1;
  uint32 height = 2;
}

message ContainerExecResp {
  oneof value {
    bytes stdout = 1;
    bytes stderr = 2;
    int32 exit_code = 3;
  }
}
