env = "development"
platform = "remote"
run_mode = "app-n-worker"
root_domain = "dev.localpaas.com"
app_domain = "app.dev.localpaas.com"
base_url = "https://app.dev.localpaas.com" # dashboard base URL
secret = "abc123"
app_path = "/var/lib/localpaas"

[admin_account]
    username = "admin"
    email = "tiendc.lp@gmail.com"
    password = "abc123"

[db]
    host = "db"
    port = 5432
    user = "localpaas"
    password = "abc123"
    db_name = "localpaas"
    ssl_mode = "disable"

[cache]
    url = "redis://default:abc123@redis:6379/0"
    use_tls = false

[http_server]
    cors_allow_origins = ["*"]

[session]
    last_access_update_period = "1m"
    passcode_timeout = "60s"
    device_trusted_period = "48h" # 2-days

    jwt_secret = "abc123"
    access_token_exp = "12h"
    refresh_token_exp = "24h"

    basic_auth_username = "localpaas"
    basic_auth_password = "abc123"

[proxy]
    http_proxy = ""
    https_proxy = ""
    no_proxy = ""
    socks5_proxy = ""

[tasks.queue]
    concurrency = 5
    task_check_interval = "1h"
    task_create_interval = "1h"

[tasks.healthcheck]
    base_interval = "30s"
