env = "development"
platform = "local"
run_mode = "app+worker"
root_domain = "localhost"
app_domain = "localhost"
base_url = "http://localhost:10000" # dashboard base URL
secret = "abc123"
app_path = ".appdata/localpaas"

[users.admin]
    username = "admin"
    email = "tiendc.lp@gmail.com"
    password = "abc123"

[users.demo]
    user_id = "01JAB9XED0GTXBSQDFVYAJ8WA9"

[db]
    host = "localhost"
    port = 35432
    user = "localpaas"
    password = "abc123"
    db_name = "localpaas"
    ssl_mode = "disable"

[cache]
    url = "redis://default:abc123@localhost:36379/0"
    use_tls = false

[http_server]
    cors_allow_origins = ["*"]

[session]
    last_access_update_period = "1m"
    passcode_timeout = "60s"
    device_trusted_period = "48h" # 2-days

    jwt_secret = "abc123"
    access_token_exp = "12h"
    refresh_token_exp = "24h"

    basic_auth_username = "localpaas"
    basic_auth_password = "abc123"

[proxy]
    http_proxy = ""
    https_proxy = ""
    no_proxy = ""
    socks5_proxy = ""

[tasks.queue]
    concurrency = 5
    task_check_interval = "10m"
    task_create_interval = "10m"

[tasks.healthcheck]
    base_interval = "15s"

[agent]
    secret_token = "abc123"

[dev_mode]
    force_agent_local = true
